name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## AI Study Buddy

            AI chat embedded in your vault — direct API calls, works on Desktop and iPad.

            ### Features
            - Direct API calls to Anthropic Claude, OpenAI, and OpenAI-compatible providers
            - Learning materials management with folder-grouped dropdown
            - Three learning roles: Private Tutor, Socratic Tutor (STEM), Language Partner (Humanities)
            - Eight learning commands: /guide, /quiz, /confuse, /gap, /predict, /audio, /feynman, /mock
            - File reference with @mention and right-click quote to chat
            - Inline edit commands: edit, explain, translate, summarize
            - Conversation history with auto-save
            - Desktop and iPad compatible
          files: |
            main.js
            manifest.json
            styles.css

      - name: Attest build artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
